<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WORMHOLE SIGNAL — Maximum Reality</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --void: #010208;
  --deep: #040a18;
  --panel: #070f1f;
  --amber: #ffaa00;
  --amber-dim: rgba(255,170,0,0.15);
  --teal: #00e5ff;
  --teal-dim: rgba(0,229,255,0.12);
  --red: #ff3355;
  --red-dim: rgba(255,51,85,0.15);
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.12);
  --white: #e8f4ff;
  --text-dim: rgba(232,244,255,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

html, body {
  width: 100%; height: 100%;
  background: var(--void);
  color: var(--white);
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ── STARFIELD ─────────────────────────────────────────────── */
#starfield {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── WORMHOLE RING ─────────────────────────────────────────── */
#wormhole-wrap {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 1;
}

#wormhole-ring {
  width: min(70vw, 70vh, 360px);
  height: min(70vw, 70vh, 360px);
  border-radius: 50%;
  border: 1px solid rgba(0,229,255,0.08);
  box-shadow:
    0 0 60px rgba(0,229,255,0.04),
    inset 0 0 80px rgba(0,10,30,0.9);
  animation: ringPulse 6s ease-in-out infinite;
  transition: box-shadow 0.3s;
}

@keyframes ringPulse {
  0%,100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.02); opacity: 1; }
}

/* ── MAIN LAYOUT ───────────────────────────────────────────── */
#app {
  position: relative;
  z-index: 10;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 16px 12px 20px;
}

/* ── HEADER ────────────────────────────────────────────────── */
#header {
  text-align: center;
  width: 100%;
}

#game-title {
  font-family: 'Exo 2', sans-serif;
  font-weight: 900;
  font-size: clamp(1rem, 5vw, 1.5rem);
  letter-spacing: 6px;
  color: var(--teal);
  text-shadow: 0 0 20px var(--teal), 0 0 60px rgba(0,229,255,0.3);
  text-transform: uppercase;
}

#game-sub {
  font-size: 0.55rem;
  letter-spacing: 3px;
  color: var(--text-dim);
  margin-top: 3px;
}

/* ── STATUS BAR ────────────────────────────────────────────── */
#status-bar {
  display: flex;
  justify-content: space-around;
  width: 100%;
  max-width: 400px;
  padding: 8px 0;
}

.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.stat-label {
  font-size: 0.5rem;
  letter-spacing: 3px;
  color: var(--text-dim);
}

.stat-value {
  font-family: 'Exo 2', sans-serif;
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--teal);
  text-shadow: 0 0 10px var(--teal);
  transition: all 0.2s;
}

/* ── MESSAGE ───────────────────────────────────────────────── */
#message {
  font-size: 0.7rem;
  letter-spacing: 3px;
  color: var(--amber);
  text-shadow: 0 0 10px var(--amber);
  text-transform: uppercase;
  min-height: 1.2rem;
  text-align: center;
  transition: all 0.3s;
}

/* ── SIGNAL PANELS ─────────────────────────────────────────── */
#signal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 10px;
  width: min(72vw, 72vh, 340px);
  height: min(72vw, 72vh, 340px);
}

.signal-panel {
  border-radius: 8px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.08s;
  border: 1.5px solid;
  display: flex;
  align-items: center;
  justify-content: center;
}

.signal-panel:active { transform: scale(0.94); }

/* Panel symbols */
.signal-panel::before {
  content: attr(data-symbol);
  font-size: clamp(1.8rem, 6vw, 2.8rem);
  opacity: 0.25;
  transition: opacity 0.15s;
  pointer-events: none;
}

/* Panel colors — dim state */
.panel-0 { background: rgba(255,170,0,0.05); border-color: rgba(255,170,0,0.2); }
.panel-1 { background: rgba(0,229,255,0.05); border-color: rgba(0,229,255,0.2); }
.panel-2 { background: rgba(255,51,85,0.05);  border-color: rgba(255,51,85,0.2); }
.panel-3 { background: rgba(0,255,136,0.05);  border-color: rgba(0,255,136,0.2); }

/* Active / lit state */
.panel-0.lit {
  background: rgba(255,170,0,0.35);
  border-color: var(--amber);
  box-shadow: 0 0 30px var(--amber), inset 0 0 20px rgba(255,170,0,0.2);
}
.panel-1.lit {
  background: rgba(0,229,255,0.3);
  border-color: var(--teal);
  box-shadow: 0 0 30px var(--teal), inset 0 0 20px rgba(0,229,255,0.2);
}
.panel-2.lit {
  background: rgba(255,51,85,0.3);
  border-color: var(--red);
  box-shadow: 0 0 30px var(--red), inset 0 0 20px rgba(255,51,85,0.2);
}
.panel-3.lit {
  background: rgba(0,255,136,0.28);
  border-color: var(--green);
  box-shadow: 0 0 30px var(--green), inset 0 0 20px rgba(0,255,136,0.2);
}

.panel-0.lit::before, .panel-1.lit::before,
.panel-2.lit::before, .panel-3.lit::before { opacity: 0.9; }

/* Wrong flash */
.panel-wrong {
  animation: wrongFlash 0.4s;
}
@keyframes wrongFlash {
  0%,100% { background: rgba(255,51,85,0.05); }
  30% { background: rgba(255,51,85,0.6); box-shadow: 0 0 50px var(--red); }
}

/* ── PROGRESS BAR ──────────────────────────────────────────── */
#progress-wrap {
  width: min(72vw, 72vh, 340px);
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}

#progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--amber));
  border-radius: 2px;
  transition: width 0.3s ease;
  width: 0%;
}

/* ── START BUTTON ──────────────────────────────────────────── */
#start-btn {
  font-family: 'Exo 2', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 4px;
  padding: 14px 40px;
  background: transparent;
  border: 2px solid var(--teal);
  color: var(--teal);
  text-shadow: 0 0 10px var(--teal);
  box-shadow: 0 0 20px rgba(0,229,255,0.2);
  cursor: pointer;
  border-radius: 2px;
  text-transform: uppercase;
  transition: all 0.2s;
  animation: btnPulse 2s ease-in-out infinite;
}

#start-btn:hover, #start-btn:active {
  background: rgba(0,229,255,0.1);
  box-shadow: 0 0 40px rgba(0,229,255,0.5);
  transform: scale(1.04);
}

@keyframes btnPulse {
  0%,100% { box-shadow: 0 0 20px rgba(0,229,255,0.2); }
  50% { box-shadow: 0 0 35px rgba(0,229,255,0.45); }
}

/* ── OVERLAY ───────────────────────────────────────────────── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(1,2,8,0.92);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  text-align: center;
  padding: 30px;
}
#overlay.show { display: flex; }

#overlay-icon { font-size: 4rem; animation: iconFloat 1s ease-in-out infinite alternate; }
@keyframes iconFloat {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-12px) scale(1.05); }
}

#overlay-title {
  font-family: 'Exo 2', sans-serif;
  font-weight: 900;
  font-size: clamp(1.5rem, 7vw, 2.4rem);
  letter-spacing: 4px;
  text-transform: uppercase;
}

#overlay-detail {
  font-size: 0.75rem;
  letter-spacing: 2px;
  color: var(--text-dim);
  line-height: 1.8;
}

#overlay-btn {
  font-family: 'Exo 2', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 4px;
  padding: 14px 36px;
  background: transparent;
  border: 2px solid var(--teal);
  color: var(--teal);
  cursor: pointer;
  border-radius: 2px;
  text-transform: uppercase;
  transition: all 0.2s;
}
#overlay-btn:hover { background: rgba(0,229,255,0.1); }

/* ── SEQUENCE INDICATOR ────────────────────────────────────── */
#seq-dots {
  display: flex;
  gap: 5px;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 300px;
  min-height: 14px;
}

.seq-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  opacity: 0.25;
  transition: opacity 0.2s, transform 0.2s;
}
.seq-dot.done { opacity: 1; transform: scale(1.2); }
.seq-dot.active { opacity: 1; transform: scale(1.5); }

.dot-0 { background: var(--amber); }
.dot-1 { background: var(--teal); }
.dot-2 { background: var(--red); }
.dot-3 { background: var(--green); }

/* ── SPEED INDICATOR ───────────────────────────────────────── */
#speed-label {
  font-size: 0.55rem;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-align: center;
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="wormhole-wrap">
  <div id="wormhole-ring"></div>
</div>

<div id="app">
  <div id="header">
    <div id="game-title">Wormhole Signal</div>
    <div id="game-sub">// deep space pattern relay //</div>
  </div>

  <div id="status-bar">
    <div class="stat">
      <div class="stat-label">LEVEL</div>
      <div class="stat-value" id="level-val">1</div>
    </div>
    <div class="stat">
      <div class="stat-label">SCORE</div>
      <div class="stat-value" id="score-val">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">BEST</div>
      <div class="stat-value" id="best-val">0</div>
    </div>
  </div>

  <div id="message">PREPARE FOR SIGNAL TRANSMISSION</div>

  <div id="signal-grid">
    <div class="signal-panel panel-0" data-idx="0" data-symbol="◈"></div>
    <div class="signal-panel panel-1" data-idx="1" data-symbol="⬡"></div>
    <div class="signal-panel panel-2" data-idx="2" data-symbol="◉"></div>
    <div class="signal-panel panel-3" data-idx="3" data-symbol="⬟"></div>
  </div>

  <div id="progress-wrap">
    <div id="progress-bar"></div>
  </div>

  <div id="seq-dots"></div>
  <div id="speed-label">SIGNAL SPEED: STANDARD</div>

  <button id="start-btn" onclick="startGame()">INITIATE LINK</button>
</div>

<!-- Overlay -->
<div id="overlay">
  <div id="overlay-icon">🚀</div>
  <div id="overlay-title"></div>
  <div id="overlay-detail"></div>
  <button id="overlay-btn" onclick="restartGame()">REESTABLISH LINK</button>
</div>

<script>
// ── STARFIELD ──────────────────────────────────────────────────────────
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];

function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 3000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.01 + Math.random() * 0.02
    });
  }
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,230,255,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

initStars();
drawStars();
window.addEventListener('resize', initStars);

// ── GAME STATE ─────────────────────────────────────────────────────────
const PANEL_COLORS = ['amber', 'teal', 'red', 'green'];
const SPEED_LABELS  = ['STANDARD', 'ACCELERATED', 'HYPERSPEED', 'WARP', 'SINGULARITY'];

let sequence = [];
let playerTurn = false;
let playerIndex = 0;
let level = 1;
let score = 0;
let highScore = parseInt(localStorage.getItem('wormhole_hs') || '0');
let gameRunning = false;
let inputLocked = false;

const panels = document.querySelectorAll('.signal-panel');

// ── AUDIO ENGINE ───────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type = 'sine', vol = 0.35) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

const PANEL_FREQS = [220, 330, 440, 550]; // amber, teal, red, green
const WRONG_FREQ  = 90;
const WIN_FREQS   = [440, 550, 660, 880];

function playPanelSound(idx) {
  ensureAudio();
  playTone(PANEL_FREQS[idx], 0.35, 'sine');
}

function playWrong() {
  ensureAudio();
  playTone(WRONG_FREQ, 0.6, 'sawtooth', 0.2);
}

function playSuccess() {
  ensureAudio();
  WIN_FREQS.forEach((f, i) => {
    setTimeout(() => playTone(f, 0.25, 'sine', 0.3), i * 80);
  });
}

// ── PANEL FLASH ────────────────────────────────────────────────────────
function flashPanel(idx, duration = 400) {
  return new Promise(resolve => {
    panels[idx].classList.add('lit');
    playPanelSound(idx);
    setTimeout(() => {
      panels[idx].classList.remove('lit');
      resolve();
    }, duration);
  });
}

// ── SEQUENCE PLAYBACK ──────────────────────────────────────────────────
function getSpeed() {
  // Level 1-3: 500ms, 4-6: 380ms, 7-9: 280ms, 10-12: 200ms, 13+: 150ms
  if (level <= 3)  return { flash: 500, gap: 200 };
  if (level <= 6)  return { flash: 380, gap: 160 };
  if (level <= 9)  return { flash: 280, gap: 120 };
  if (level <= 12) return { flash: 200, gap: 90 };
  return             { flash: 150, gap: 70 };
}

function getSpeedLabel() {
  if (level <= 3)  return 'STANDARD';
  if (level <= 6)  return 'ACCELERATED';
  if (level <= 9)  return 'HYPERSPEED';
  if (level <= 12) return 'WARP';
  return 'SINGULARITY';
}

async function playSequence() {
  playerTurn = false;
  inputLocked = true;
  setMessage('RECEIVING ALIEN SIGNAL...');
  updateDots(-1);

  // Brief pause before showing sequence
  await delay(600);

  const { flash, gap } = getSpeed();

  for (let i = 0; i < sequence.length; i++) {
    await flashPanel(sequence[i], flash);
    await delay(gap);
  }

  playerTurn = true;
  inputLocked = false;
  playerIndex = 0;
  updateProgress();
  setMessage(`RELAY THE SIGNAL — ${sequence.length} PULSE${sequence.length > 1 ? 'S' : ''}`);
  updateDots(0);
}

function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ── PLAYER INPUT ───────────────────────────────────────────────────────
panels.forEach(panel => {
  panel.addEventListener('click', () => handleInput(parseInt(panel.dataset.idx)));
  panel.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleInput(parseInt(panel.dataset.idx));
  }, { passive: false });
});

async function handleInput(idx) {
  if (!playerTurn || inputLocked || !gameRunning) return;
  inputLocked = true;

  await flashPanel(idx, 220);

  if (idx === sequence[playerIndex]) {
    // Correct!
    playerIndex++;
    updateDots(playerIndex);
    updateProgress();

    if (playerIndex === sequence.length) {
      // Round complete!
      playerTurn = false;
      score += level * 10;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('wormhole_hs', highScore);
      }
      updateScoreDisplay();
      playSuccess();
      setMessage('✦ SIGNAL RELAYED — LINK STABLE ✦');
      await delay(900);
      level++;
      sequence.push(Math.floor(Math.random() * 4));
      updateLevelDisplay();
      document.getElementById('speed-label').textContent = 'SIGNAL SPEED: ' + getSpeedLabel();
      await playSequence();
    } else {
      inputLocked = false;
    }
  } else {
    // Wrong!
    playerTurn = false;
    playWrong();
    panel.classList.add('panel-wrong');
    setTimeout(() => panel.classList.remove('panel-wrong'), 500);
    setMessage('✗ SIGNAL CORRUPTED — LINK LOST');
    await delay(1200);
    showGameOver();
  }
}

// ── UI HELPERS ─────────────────────────────────────────────────────────
function setMessage(msg) {
  document.getElementById('message').textContent = msg;
}

function updateScoreDisplay() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('best-val').textContent = highScore;
}

function updateLevelDisplay() {
  document.getElementById('level-val').textContent = level;
}

function updateProgress() {
  const pct = playerTurn ? (playerIndex / sequence.length) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updateDots(completedUpTo) {
  const wrap = document.getElementById('seq-dots');
  wrap.innerHTML = '';
  sequence.forEach((panelIdx, i) => {
    const dot = document.createElement('div');
    dot.className = `seq-dot dot-${panelIdx}`;
    if (i < completedUpTo) dot.classList.add('done');
    else if (i === completedUpTo) dot.classList.add('active');
    wrap.appendChild(dot);
  });
}

// ── GAME FLOW ──────────────────────────────────────────────────────────
function startGame() {
  ensureAudio();
  document.getElementById('start-btn').style.display = 'none';
  gameRunning = true;
  level = 1;
  score = 0;
  sequence = [Math.floor(Math.random() * 4)];
  updateScoreDisplay();
  updateLevelDisplay();
  document.getElementById('speed-label').textContent = 'SIGNAL SPEED: STANDARD';
  playSequence();
}

function showGameOver() {
  gameRunning = false;
  const overlay = document.getElementById('overlay');
  document.getElementById('overlay-icon').textContent = level > 10 ? '🌌' : level > 5 ? '🛸' : '💫';
  document.getElementById('overlay-title').textContent = 'LINK SEVERED';
  document.getElementById('overlay-title').style.color = 'var(--red)';
  document.getElementById('overlay-title').style.textShadow = '0 0 20px var(--red)';
  document.getElementById('overlay-detail').innerHTML =
    `LEVEL REACHED: ${level}<br>SCORE: ${score}<br>BEST: ${highScore}<br><br>` +
    (score >= highScore && score > 0 ? '✦ NEW RECORD ✦' : 'THE VOID AWAITS');
  overlay.classList.add('show');
}

function restartGame() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('seq-dots').innerHTML = '';
  startGame();
}

// Init display
document.getElementById('best-val').textContent = highScore;
</script>
</body>
</html>
